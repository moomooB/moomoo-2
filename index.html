<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>moomoo ☁️</title>
  <style>
    :root {
      --bg:            #eef8fd;
      --bg-secondary:  #f7fcff;
      --bg-card:       #ffffff;
      --text:          #1e4f6b;
      --text-sub:      #5a9ab8;
      --accent:        #4db6d6;
      --accent-soft:   #b3e5f5;
      --border:        rgba(77, 182, 214, 0.2);
      --shadow:        0 4px 20px rgba(77, 182, 214, 0.15);
      --shadow-hover:  0 14px 36px rgba(77, 182, 214, 0.3);
      --btn-bg:        linear-gradient(135deg, #4db6d6 0%, #2a9ec2 100%);
      --btn-hover:     linear-gradient(135deg, #2a9ec2 0%, #1a88aa 100%);
      --btn-shadow:    0 6px 22px rgba(77, 182, 214, 0.45);
    }

    [data-theme="dark"] {
      --bg:            #0b1e2d;
      --bg-secondary:  #0f2637;
      --bg-card:       #152d3f;
      --text:          #cce9f7;
      --text-sub:      #6db8d6;
      --accent:        #4db6d6;
      --accent-soft:   #153348;
      --border:        rgba(77, 182, 214, 0.18);
      --shadow:        0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-hover:  0 14px 36px rgba(77, 182, 214, 0.25);
      --btn-bg:        linear-gradient(135deg, #2a9ec2 0%, #1a88aa 100%);
      --btn-hover:     linear-gradient(135deg, #1a88aa 0%, #0f7090 100%);
      --btn-shadow:    0 6px 22px rgba(77, 182, 214, 0.3);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 60px;
      overflow-x: hidden;
      transition: background 0.35s, color 0.35s;
      position: relative;
    }

    /* soft background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      transition: background 0.35s;
    }
    body::before {
      width: 600px; height: 600px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(77,182,214,0.12) 0%, transparent 70%);
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -150px; right: -150px;
      background: radial-gradient(circle, rgba(179,229,245,0.1) 0%, transparent 70%);
    }

    /* ── Dark mode toggle ── */
    .toggle-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      user-select: none;
    }
    .toggle-btn:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    /* ── Main container ── */
    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding-top: 72px;
    }

    /* ── Time greeting ── */
    .time-greet {
      font-size: 14px;
      color: var(--text-sub);
      letter-spacing: 0.4px;
      opacity: 0;
      animation: fadeDown 0.7s ease 0.1s forwards;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.3s forwards;
      text-align: center;
    }

    .hero-emoji {
      font-size: 88px;
      line-height: 1;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(77,182,214,0.25));
      animation: floatY 3.5s ease-in-out infinite;
    }

    .hero-name {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-tagline {
      font-size: 17px;
      color: var(--text-sub);
      min-height: 26px;
      letter-spacing: 0.3px;
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.85s step-end infinite;
    }

    /* ── Cards ── */
    .cards-wrap {
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.55s forwards;
    }
    .cards-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 30px 14px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.35s ease;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-12px);
      box-shadow: var(--shadow-hover);
    }
    .card-icon {
      font-size: 38px;
      display: block;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: 11.5px;
      color: var(--text-sub);
    }

    /* ── Button ── */
    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.75s forwards;
    }
    .greet-btn {
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 44px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .greet-btn:hover {
      background: var(--btn-hover);
      transform: scale(1.07);
      box-shadow: 0 12px 34px rgba(77,182,214,0.5);
    }
    .greet-btn:active { transform: scale(0.96); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      width: 100%;
      max-width: 420px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      transform: translateY(30px) scale(0.96);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }
    .modal-header {
      padding: 22px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-close {
      background: var(--accent-soft);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .modal-close:hover { background: var(--accent); color: #fff; transform: rotate(90deg); }
    .modal-body {
      overflow-y: auto;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 4px; }
    .bakery-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .bakery-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .bakery-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .bakery-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .bakery-stars { font-size: 14px; letter-spacing: 1px; flex-shrink: 0; }
    .bakery-location {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 9px;
      font-weight: 600;
      width: fit-content;
    }
    .bakery-memo {
      font-size: 13px;
      color: var(--text-sub);
    }
    .modal-empty {
      text-align: center;
      color: var(--text-sub);
      font-size: 14px;
      padding: 30px 0;
    }

    /* ── Footer ── */
    .footer {
      font-size: 12px;
      color: var(--text-sub);
      opacity: 0.5;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.95s forwards;
    }

    /* ── Confetti canvas ── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Mobile ── */
    @media (max-width: 420px) {
      .hero-emoji  { font-size: 68px; }
      .hero-name   { font-size: 34px; }
      .hero-tagline{ font-size: 15px; }
      .card        { padding: 22px 10px 18px; border-radius: 18px; }
      .card-icon   { font-size: 30px; margin-bottom: 8px; }
      .card-title  { font-size: 13px; }
      .cards       { gap: 10px; }
      .greet-btn   { padding: 14px 34px; font-size: 15px; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- dark mode toggle -->
<button class="toggle-btn" id="toggle-btn" onclick="toggleDark()">
  <span id="toggle-icon">🌙</span>
  <span id="toggle-label">다크모드</span>
</button>

<div class="wrap">

  <!-- time greeting -->
  <div class="time-greet" id="time-greet"></div>

  <!-- hero -->
  <div class="hero">
    <span class="hero-emoji">🥯</span>
    <div class="hero-name">moomoo</div>
    <div class="hero-tagline">
      <span id="typed"></span><span class="cursor" id="cursor"></span>
    </div>
  </div>

  <!-- cards -->
  <div class="cards-wrap">
    <div class="cards-label">✨ 좋아하는 것들</div>
    <div class="cards">
      <div class="card">
        <span class="card-icon">🎹</span>
        <div class="card-title">피아노</div>
        <div class="card-sub">건반 위의 감정</div>
      </div>
      <div class="card">
        <span class="card-icon">🎵</span>
        <div class="card-title">음악</div>
        <div class="card-sub">하루의 soundtrack</div>
      </div>
      <div class="card">
        <span class="card-icon">🥐</span>
        <div class="card-title">빵</div>
        <div class="card-sub">따뜻하고 포근한</div>
      </div>
    </div>
  </div>

  <!-- button -->
  <div class="btn-wrap">
    <button class="greet-btn" onclick="openModal()">🥯 빵 드실래요?</button>
  </div>

  <!-- footer -->
  <div class="footer">made with 🩵 by moomoo</div>

</div>

<!-- bakery modal -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🥯 내가 먹은 빵집들</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ── Time greeting ── */
(function () {
  const h = new Date().getHours();
  const el = document.getElementById('time-greet');
  if (h >= 5 && h < 12)       el.textContent = '☀️ 좋은 아침이에요!';
  else if (h >= 12 && h < 18) el.textContent = '🌤️ 좋은 오후예요!';
  else                         el.textContent = '🌙 좋은 저녁이에요!';
})();

/* ── Typing effect ── */
(function () {
  const full = '책을 좋아하는 내향인 📚';
  const el   = document.getElementById('typed');
  const cur  = document.getElementById('cursor');
  let i = 0;
  function tick() {
    if (i < full.length) {
      el.textContent += full[i++];
      setTimeout(tick, 75 + Math.random() * 65);
    } else {
      cur.style.display = 'none';
    }
  }
  setTimeout(tick, 1400);
})();

/* ── Bakery list (여기에 빵집 추가/수정하면 돼요) ── */
const BAKERIES = [
  { name: '밀도',       location: '성수동',  rating: 5, memo: '식빵이 진짜 진짜 맛있었어요' },
  { name: '런던 베이글 뮤지엄', location: '안국',    rating: 4, memo: '줄 서서 먹을 만한 가치 있음' },
  { name: '쏠트',       location: '합정',    rating: 5, memo: '소금빵은 여기가 원탑' },
  { name: '빵굽는 사람들', location: '연남동',  rating: 4, memo: '크루아상 결이 완벽해요' },
  { name: '오월의 종',   location: '익선동',  rating: 3, memo: '분위기가 너무 예뻤어요' },
];

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderModal() {
  const body = document.getElementById('modal-body');
  if (!BAKERIES.length) {
    body.innerHTML = '<div class="modal-empty">아직 기록된 빵집이 없어요 🥲</div>';
    return;
  }
  body.innerHTML = BAKERIES.map(b => `
    <div class="bakery-card">
      <div class="bakery-row">
        <span class="bakery-name">${b.name}</span>
        <span class="bakery-stars">${stars(b.rating)}</span>
      </div>
      <span class="bakery-location">📍 ${b.location}</span>
      ${b.memo ? `<span class="bakery-memo">${b.memo}</span>` : ''}
    </div>
  `).join('');
}

function openModal() {
  renderModal();
  document.getElementById('modal-overlay').classList.add('open');
  fireworks();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

/* ── Dark mode ── */
let dark = false;
function toggleDark() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('toggle-icon').textContent  = dark ? '☀️' : '🌙';
  document.getElementById('toggle-label').textContent = dark ? '라이트모드' : '다크모드';
}

/* ── Confetti ── */
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');
let pieces   = [];
let raf;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PALETTE = [
  '#4db6d6','#87ceeb','#b3e5f5','#ffd6e7',
  '#ffeaa7','#a8e6cf','#dda0dd','#ffb3ba','#ffffba'
];

class Piece {
  constructor(delay) {
    this.delay = delay;
    this.reset(true);
  }
  reset(init) {
    this.x  = Math.random() * canvas.width;
    this.y  = init ? -20 : -20;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = Math.random() * 3.5 + 2;
    this.rot = Math.random() * 360;
    this.rs  = (Math.random() - 0.5) * 8;
    this.w   = Math.random() * 10 + 5;
    this.h   = Math.random() * 6 + 3;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.alpha = 1;
    this.born  = false;
  }
  update(now) {
    if (!this.born) {
      if (now < this.delay) return;
      this.born = true;
    }
    this.x   += this.vx;
    this.vy  += 0.06;
    this.y   += this.vy;
    this.rot += this.rs;
    if (this.y > canvas.height * 0.75) this.alpha -= 0.018;
  }
  draw() {
    if (!this.born || this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot * Math.PI / 180);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function loop(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces = pieces.filter(p => p.alpha > 0 || !p.born);
  if (!pieces.length) return;
  pieces.forEach(p => { p.update(now); p.draw(); });
  raf = requestAnimationFrame(loop);
}

function fireworks() {
  cancelAnimationFrame(raf);
  pieces = [];
  const start = performance.now();
  for (let i = 0; i < 180; i++) {
    pieces.push(new Piece(start + i * 12));
  }
  raf = requestAnimationFrame(loop);
}
</script>
</body>
</html>
